<!DOCTYPE html>
<html>

<head>
    <title>Main - Page 2</title>
    <link rel="stylesheet" href="login_style.css">
</head>

<body>
    <fieldset class="loginTitle">
        <legend>Login</legend>
        <form action="./register.html" method="get" id="loginForm">
            <div class="labelFrom">
                <label for="username"> User name: </label>
            </div>
            <div>
                <input type="text" name="username" accesskey="u" id="username" placeholder="Enter user name">
            </div>

            <div class="labelFrom">
                <label for="password"> User password: </label>
            </div>
            <div>
                <input type="password" name="password" accesskey="p" id="password" placeholder="Enter user password">
            </div>

            <div class="checkbox">
                <label class="labelFrom">
                    <input type="checkbox" name="rememberMe" accesskey="r">
                    Remember me
                </label>
            </div>

            <div style="text-align: center;">
                <input type="submit" value="Sign in..." accesskey="s">
            </div>

        </form>
    </fieldset>


    <div></div>
</body>

</html>
