<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Number Pad</title>

  <style>
    body {
      background: #f4f6f9;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
      width: 260px;
    }

    #txt {
      width: 100%;
      height: 45px;
      margin-bottom: 15px;
      font-size: 18px;
      text-align: right;
      padding-right: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    input[type="button"] {
      height: 45px;
      font-size: 16px;
      border-radius: 8px;
      background-color: #4a90e2;
      color: white;
    }

    input[type="button"]:hover {
      background-color: #357abd;
    }
  </style>
</head>

<body>

  <div class="container">
    <input type="text" id="txt" readonly>

    <div class="buttons">
      <input type="button" value="1" onclick="addVal(this)">
      <input type="button" value="2" onclick="addVal(this)">
      <input type="button" value="3" onclick="addVal(this)">
      <input type="button" value="4" onclick="addVal(this)">
      <input type="button" value="5" onclick="addVal(this)">
      <input type="button" value="6" onclick="addVal(this)">
      <input type="button" value="7" onclick="addVal(this)">
      <input type="button" value="8" onclick="addVal(this)">
      <input type="button" value="9" onclick="addVal(this)">
      <input type="button" value="C" class="control" onclick="removeAll()">
      <input type="button" value="Del" class="control" onclick="removeDigit()">
    </div>
  </div>

  <script>
    function addVal(input) {
      document.querySelector('#txt').value += input.value;
    }

    function removeAll() {
      document.querySelector('#txt').value = "";
    }

    function removeDigit() {
      const txt = document.querySelector('#txt');
      if (txt.value < 10) {
        txt.value = "";
      } else {
        txt.value = parseInt(txt.value / 10);
      }
    }
  </script>

</body>

</html>
