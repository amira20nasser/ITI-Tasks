<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTML</title>


    <style>
        body {
            background: #f4f6f9;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 440px;
        }

        input[type='text'],
        input[type='email'],
        input[type='password'],
        input[type='tel'] {
            width: 400px;
            height: 30px;
            margin-bottom: 15px;
            font-size: 18px;
            padding-right: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        input[type="submit"] {
            height: 40px;
            width: 100px;
            font-size: 16px;
            border-radius: 8px;
            background-color: #478bd9;
            color: white;
        }

        input[type="submit"]:hover {
            background-color: #357abd;
        }
    </style>
</head>

<body>

    <div class="container">
        <form id="formId" action="#" method="get">

            <label>Name</label><br>
            <input type="text" name="name"><br><br>

            <label>Email</label><br>
            <input type="email" name="email"><br><br>

            <input id="submitId" type="submit" value="Submit">

        </form>

    </div>

    <script>
        document.oncontextmenu = function () {
            event.preventDefault();
        }

        // Task 1 
        let form = document.getElementById("formId");
        form.addEventListener("submit", function () {
            let confirmed = confirm("Do you want to submit ?");
            if (!confirmed) {
                event.preventDefault();
            }
        });

        // Task 2
        let id;
        startTimer();
        function startTimer() {
            let custEvent = new CustomEvent("custEvent", { detail: "User inactive for 30 seconds" });
            id = setTimeout(function () {
                document.dispatchEvent(custEvent);
            }, 30000);
        }

        function resetTimer() {
            clearTimeout(id);
            startTimer();
        }

        const inputs = form.querySelectorAll("input[type='text'], input[type='email']");


        inputs.forEach(input => {
            input.addEventListener("input", resetTimer);
        });

        document.addEventListener("custEvent", function (e) {
            alert(e.detail);
        });
    </script>
</body>

</html>
