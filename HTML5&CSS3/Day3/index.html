    <style>
        .circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: crimson;
            position: relative;
        }

        .circle::after {
            content: "";
            position: absolute;
            top: 30%;
            right: 0;
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 40px solid white;
            border-bottom: 20px solid transparent;
            border-top: 20px solid transparent;
            opacity: 0;
            animation: showTriangle 3s alternate infinite;
        }

        @keyframes showTriangle {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

    <div class="circle" id="d">
