<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>

<body>
    <form action="./table.html" method="get">
        <label for="search">
            Search
        </label>
        <br> <br>
        <input autofocus tabindex="0" type="text" name="search" id="search" placeholder="Enter A Search Word">

        <br> <br>
        <label for="upload">
            Upload
        </label>
        <br><br>
        <input type="file" name="upload" id="upload">
        <br> <br>
        <label for="url">
            Url
        </label>
        <br> <br>
        <input type="url" name="url" id="url" required>
        <br> <br>
        <label for="date"> Date</label>
        <input type="date" name="date" id="date">
        <br> <br>
        <label for="month"> Month</label>
        <input type="month" name="month" id="month" value="1982-10">
        <br> <br>
        <br> <br>
        <button type="reset">Empty</button>
        <button type="submit">Save</button>
        <pre>
Hello Line One
Hello Line Two
Hello Line Three
      Hello Line Four
        </pre>
    </form>
    <iframe src="https://elzero.org/" frameborder="0" width="100%" height="400px"></iframe>
    <script>
        const form = document.getElementsByTagName("form");
        const urlInput = document.getElementById("url");
        form.onsubmit = function () {
            if (urlInput.value.trim() === "") {
                urlInput.removeAttribute("required");
            }
        };
    </script>
</body>

</html>
